name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libffi-dev \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libnss3-dev \
          libssl-dev \
          libreadline-dev \
          libsqlite3-dev \
          libbz2-dev

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer, Cython and virtualenv
      run: |
        python3 -m pip install --upgrade pip
        # Kivy and python-for-android require Cython < 3.0.0
        python3 -m pip install --user --upgrade "Cython<3.0.0" virtualenv buildozer
        # Add local pip bin directory to PATH
        echo "/home/runner/.local/bin" >> $GITHUB_PATH

    - name: Build APK with Buildozer
      run: |
        # Accept Android SDK licenses automatically, run with verbosity, and log to file
        yes | buildozer -v android debug > buildozer_log.txt 2>&1
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

    - name: Upload Build Logs (Always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-compilation-log
        path: buildozer_log.txt

    - name: Locate and Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: yt-downloader-android-apk
        path: bin/*.apk
